{{- range .Values.targets }}
{{- if and .dsn (not .existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "pgpulse.targetFullname" (dict "root" $ "target" .) }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "pgpulse.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ .name }}
type: Opaque
stringData:
  PG_DSN: {{ .dsn | quote }}
{{- end }}
{{- end }}
